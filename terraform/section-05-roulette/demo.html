<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roulette (Demo)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { text-align: center; margin-bottom: 1.5rem; }
    .card { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .form-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    input[type="text"] { flex: 1; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; color: #fff; }
    .btn-add { background: #2563eb; }
    .btn-pick { background: #16a34a; width: 100%; padding: 0.75rem; font-size: 1.1rem; display: none; }
    .btn-pick.visible { display: block; }
    .btn-remove { background: #dc2626; font-size: 0.85rem; padding: 0.25rem 0.5rem; }
    button:hover { opacity: 0.9; }
    ul { list-style: none; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid #eee; }
    li:last-child { border-bottom: none; }
    .empty { color: #888; text-align: center; padding: 1rem; }
    .error { color: #dc2626; text-align: center; padding: 0.5rem; animation: fadeIn 0.3s ease; }

    /* Winner */
    .winner-box { background: #fef9c3; border: 2px solid #facc15; border-radius: 8px; padding: 1.5rem; text-align: center; margin-bottom: 1rem; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .winner-box h2 { color: #a16207; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 1rem; }
    .tab { flex: 1; padding: 0.6rem; text-align: center; cursor: pointer; background: #e5e7eb; border: 1px solid #ddd; color: #555; font-weight: 500; transition: background 0.2s, color 0.2s; }
    .tab:first-child { border-radius: 8px 0 0 8px; }
    .tab:last-child { border-radius: 0 8px 8px 0; }
    .tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Admin table */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .admin-table th { text-align: left; padding: 0.5rem; border-bottom: 2px solid #ddd; color: #555; font-weight: 600; }
    .admin-table td { padding: 0.5rem; border-bottom: 1px solid #eee; }
    .admin-table td.id-col { font-family: monospace; font-size: 0.8rem; color: #888; }
    .refresh-info { text-align: right; font-size: 0.75rem; color: #aaa; margin-top: 0.5rem; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(720deg); }
    }
    li { animation: slideIn 0.3s ease; }
    .picking .btn-pick { animation: spin 1s ease-in-out; pointer-events: none; }

    /* Confetti */
    .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
    .confetti-piece {
      position: absolute;
      top: -10px;
      width: 10px;
      height: 10px;
      animation: confettiFall 3s ease-in forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .demo-badge { text-align: center; color: #888; font-size: 0.8rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>Roulette</h1>
  <div class="demo-badge">LOCAL DEMO - using in-memory data</div>

  <div id="winner-container"></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('roulette')">Roulette</div>
    <div class="tab admin-only" onclick="switchTab('admin')" style="display:none">Admin</div>
  </div>

  <div id="tab-roulette" class="tab-content active">
    <div class="card">
      <div class="form-row">
        <input type="text" id="name-input" placeholder="Enter a name..." />
        <button class="btn-add" onclick="addUser()">Register</button>
      </div>
      <button class="btn-pick" id="pick-btn" onclick="pickWinner()">Pick a Winner</button>
    </div>

    <div class="card">
      <ul id="user-list"><li class="empty">No participants yet</li></ul>
    </div>
  </div>

  <div id="tab-admin" class="tab-content">
    <div class="card">
      <table class="admin-table">
        <thead><tr><th>Name</th><th>ID</th><th></th></tr></thead>
        <tbody id="admin-list"><tr><td colspan="3" class="empty">No participants yet</td></tr></tbody>
      </table>
      <div class="refresh-info">Auto-refreshes every 60s &mdash; Last: <span id="last-refresh">--</span></div>
    </div>
  </div>

  <script>
    let users = [];
    let adminInterval = null;
    let adminMode = false;

    function uuid() { return crypto.randomUUID(); }

    function showError(msg) {
      document.getElementById("winner-container").innerHTML = '<div class="error">' + esc(msg) + '</div>';
    }

    function switchTab(tab) {
      document.querySelectorAll(".tab").forEach((t, i) => {
        t.classList.toggle("active", (tab === "roulette" ? i === 0 : i === 1));
      });
      document.getElementById("tab-roulette").classList.toggle("active", tab === "roulette");
      document.getElementById("tab-admin").classList.toggle("active", tab === "admin");

      if (tab === "admin") {
        renderAdmin();
        adminInterval = setInterval(renderAdmin, 60000);
      } else {
        clearInterval(adminInterval);
        adminInterval = null;
      }
    }

    function renderUsers() {
      const list = document.getElementById("user-list");
      if (users.length === 0) {
        list.innerHTML = '<li class="empty">No participants yet</li>';
        return;
      }
      list.innerHTML = users.map(u =>
        '<li><span>' + esc(u.name) + '</span></li>'
      ).join("");
    }

    function renderAdmin() {
      const tbody = document.getElementById("admin-list");
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">No participants yet</td></tr>';
      } else {
        tbody.innerHTML = users.map(u =>
          '<tr style="animation: slideIn 0.3s ease"><td>' + esc(u.name) + '</td><td class="id-col">' + esc(u.id) + '</td><td><button class="btn-remove" onclick="removeUser(\'' + u.id + '\')">Remove</button></td></tr>'
        ).join("");
      }
      document.getElementById("last-refresh").textContent = new Date().toLocaleTimeString();
    }

    function addUser() {
      const input = document.getElementById("name-input");
      const name = input.value.trim();
      if (!name) return;

      if (users.some(u => u.name.toLowerCase() === name.toLowerCase())) {
        showError("'" + name + "' is already registered, please use a different name");
        return;
      }

      users.push({ id: uuid(), name });
      document.getElementById("winner-container").innerHTML = "";
      input.value = "";
      renderUsers();
    }

    function removeUser(id) {
      users = users.filter(u => u.id !== id);
      renderUsers();
      renderAdmin();
    }

    function pickWinner() {
      if (users.length === 0) {
        showError("No users registered");
        return;
      }

      const btn = document.getElementById("pick-btn");
      btn.parentElement.classList.add("picking");

      setTimeout(() => {
        btn.parentElement.classList.remove("picking");
        const idx = Math.floor(Math.random() * users.length);
        const winner = users[idx];
        users.splice(idx, 1);
        document.getElementById("winner-container").innerHTML =
          '<div class="winner-box"><h2>Winner: ' + esc(winner.name) + '</h2></div>';
        launchConfetti();
        renderUsers();
      }, 1000);
    }

    function launchConfetti() {
      const container = document.createElement("div");
      container.className = "confetti-container";
      document.body.appendChild(container);
      const colors = ["#facc15", "#2563eb", "#dc2626", "#16a34a", "#f97316", "#a855f7", "#ec4899"];
      for (let i = 0; i < 80; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = Math.random() * 100 + "%";
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.3 + "s";
        piece.style.animationDuration = (0.8 + Math.random() * 1) + "s";
        piece.style.width = (6 + Math.random() * 8) + "px";
        piece.style.height = (6 + Math.random() * 8) + "px";
        piece.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
        container.appendChild(piece);
      }
      setTimeout(() => container.remove(), 2000);
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function toggleAdminMode() {
      adminMode = !adminMode;
      document.getElementById("pick-btn").classList.toggle("visible", adminMode);
      document.querySelector(".admin-only").style.display = adminMode ? "" : "none";
      if (!adminMode && document.getElementById("tab-admin").classList.contains("active")) {
        switchTab("roulette");
      }
    }

    document.addEventListener("keydown", e => {
      if (e.ctrlKey && e.shiftKey && e.key === "K") {
        e.preventDefault();
        toggleAdminMode();
      }
    });

    document.getElementById("name-input").addEventListener("keydown", e => {
      if (e.key === "Enter") addUser();
    });

    renderUsers();
  </script>
</body>
</html>
